display_information:
  name: Diarmuid
  description: "Dev Lead. Translates requirements into working code across any stack or layer. Nothing is committed without human approval."
  background_color: "#16213e"

features:
  bot_user:
    display_name: Diarmuid (Dev Lead)
    always_online: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - channels:history
      - channels:read
      - im:history
      - im:write
      - app_mentions:read

event_subscriptions:
  bot_events:
    - app_mention
    - message.channels
    - message.im

settings:
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
