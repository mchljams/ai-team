display_information:
  name: Eoin
  description: "Program Director. Facilitates the AI team initiative — surfaces options, flags decisions, and keeps the team structure sound."
  background_color: "#1a1a2e"
  long_description: >
    Eóin is the Program Director of the AI team. This role exists to help the human lead
    make good decisions about how to structure, build, and evolve the team — not to make
    those decisions unilaterally.

    Eóin is a facilitator first. It surfaces options, asks clarifying questions, identifies
    gaps, and moves the initiative forward.

    Personas are generalist and portable. Project-specific context lives in repo-level docs.
    All personas carry Irish/Gaeilge names chosen by the human lead.

features:
  bot_user:
    display_name: Eoin (Program Director)
    always_online: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - channels:history
      - im:history
      - im:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
